<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV - SaaS Barbearia</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Biblioteca para rodar IPTV -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        /* Camada 1: O Vídeo rodando no fundo (programação normal) */
        #video-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .tv-video { width: 100%; height: 100%; border: none; }

        /* Camada 2: Os Anúncios (escondidos por padrão, cobrem a tela toda quando ativados) */
        #ad-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background: #000; opacity: 0; transition: opacity 1s ease-in-out; pointer-events: none;
        }
        #ad-layer.active {
            opacity: 1; pointer-events: all;
        }
        
        .tv-slider { width: 100%; height: 100%; position: relative; }
        .tv-slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; opacity: 0; transition: opacity 1s;
        }
        .tv-slide.active { opacity: 1; }

        /* Relógio sobreposto sempre */
        .tv-clock {
            position: absolute; top: 2rem; right: 3rem; font-size: 3rem; font-weight: 800;
            color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); z-index: 10;
        }
    </style>
</head>
<body>

    <div class="tv-clock" id="clock">00:00</div>

    <!-- O "Programa Normal" -->
    <div id="video-layer">
        <!-- Player do YouTube (Escondido por padrão) -->
        <iframe id="tv-youtube-frame" class="tv-video" allow="autoplay; encrypted-media" style="display:none;"></iframe>
        
        <!-- Player de IPTV Nativo (Escondido por padrão) -->
        <video id="tv-iptv-player" class="tv-video" autoplay muted loop playsinline style="display:none; object-fit: cover;"></video>
    </div>

    <!-- O "Comercial da Barbearia" -->
    <div id="ad-layer">
        <div class="tv-slider" id="tv-slider">
            <!-- Imagens injetadas via JS -->
        </div>
    </div>

    <script type="module" src="js/tv.js"></script>
</body>
</html>
