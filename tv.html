<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS TV</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        /* Camada 1: O Vídeo rodando no fundo (programação normal) */
        #video-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        #tv-video-frame {
            width: 100%; height: 100%; border: none; pointer-events: none;
        }

        /* Camada 2: Os Anúncios (escondidos por padrão, cobrem a tela toda quando ativados) */
        #ad-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background: #000; opacity: 0; transition: opacity 1s ease-in-out; pointer-events: none;
        }
        #ad-layer.active {
            opacity: 1; pointer-events: all;
        }
        
        .tv-slider { width: 100%; height: 100%; position: relative; }
        .tv-slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; opacity: 0; transition: opacity 1s;
        }
        .tv-slide.active { opacity: 1; }

        /* Relógio sobreposto sempre */
        .tv-clock {
            position: absolute; top: 2rem; right: 3rem; font-size: 3rem; font-weight: 800;
            color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); z-index: 10;
        }
    </style>
</head>
<body>

    <div class="tv-clock" id="clock">00:00</div>

    <!-- O "Programa Normal" -->
    <div id="video-layer">
        <!-- O YouTube não permite autoplay com som, então mute=1 é obrigatório na maioria das vezes para tocar sozinho -->
        <iframe id="tv-video-frame" src="" allow="autoplay; encrypted-media"></iframe>
    </div>

    <!-- O "Comercial da Barbearia" -->
    <div id="ad-layer">
        <div class="tv-slider" id="tv-slider">
            <!-- Imagens injetadas via JS -->
        </div>
    </div>

    <script type="module" src="js/tv.js"></script>
</body>
</html>
