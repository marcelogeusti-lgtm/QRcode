<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV - SaaS Barbearia</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Biblioteca para rodar IPTV -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="margin: 0; padding: 0; background: black; overflow: hidden; color: white; font-family: 'Inter', sans-serif;">
    <!-- OSD (On Screen Display) de Troca de Canal -->
    <div id="channel-osd" style="position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.8); color:var(--accent-gold); padding:1rem 2rem; border-radius:8px; font-size:2rem; font-weight:bold; z-index:9999; opacity:0; transition:opacity 0.3s ease; pointer-events:none;">
        <span id="channel-osd-name">Canal Atual</span>
    </div>

    <!-- Comercial Fullscreen Overlay -->
    <div id="fullscreen-ad-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9998; display:none; justify-content:center; align-items:center;">
        <img id="fullscreen-ad-img" src="" style="max-width:100%; max-height:100%; object-fit:contain; display:none;">
        <video id="fullscreen-ad-video" src="" style="max-width:100%; max-height:100%; object-fit:contain; display:none;"></video>
    </div>

    <div class="tv-container">
        <!-- 1. Background de Vídeo (Roda 100% do tempo) -->
        <div class="tv-background">
            <div id="player" class="tv-video" style="display:none; width:100%; height:100%;"></div>
            <video id="tv-iptv-player" class="tv-video" autoplay muted loop playsinline style="display:none; object-fit: cover;"></video>
        </div>

        <!-- 2. Overlay Híbrido (L-Shape) -->
        <div class="tv-overlay">
            
            <!-- Zona transparente superior com a barra lateral direita -->
            <div class="tv-transparent-zone">
                <div class="tv-sidebar" id="tv-sidebar">
                    <div class="tv-sidebar-content">
                        <img id="tv-logo" class="logo" src="https://via.placeholder.com/150" alt="Logo">
                        <h2 id="tv-nome" style="margin-bottom: 0.5rem; font-size: 1.8rem; color: var(--accent-gold);">Nome</h2>
                        
                        <div id="qrcode-tv" style="margin: 2rem auto; background: white; padding: 10px; display: inline-block; border-radius: 8px;"></div>
                        <p style="font-weight: bold; margin-bottom: 2rem;">Aponte a câmera para se conectar ao Wi-Fi</p>
                        
                        <h1 id="clock" style="font-size: 3rem; font-weight: 300; margin-top: auto; color: var(--accent-gold);">00:00</h1>
                    </div>
                </div>
            </div>

            <!-- Banner Inferior para Propagandas -->
            <div class="tv-bottom-banner" id="tv-bottom-banner">
                <div id="tv-slider">
                    <!-- Slides injetados pelo JS -->
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="js/tv.js"></script>
</body>
</html>
