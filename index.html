<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carregando...</title>
    <meta name="theme-color" content="#d4af37">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="mobile-container" style="position: relative; overflow: hidden; min-height: 100vh;">
        <div id="bg-media-container" style="position: absolute; inset: 0; z-index: -1; width: 100%; height: 100%; background-color: var(--background);"></div>
        <!-- Header -->
        <header class="header fade-up stagger-1">
            <img src="" alt="Logo" id="wl-logo" class="logo-img">
            <h1 id="wl-nome">...</h1>
            <p id="wl-slogan">...</p>
        </header>

        <!-- Redes Sociais -->
        <div class="social-row fade-up stagger-2" id="wl-social-row">
            <a href="#" id="wl-instagram" class="btn btn-outline" target="_blank" style="display: none;">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="#" id="wl-whatsapp" class="btn" target="_blank" style="display: none;">
                <i class="fab fa-whatsapp"></i> Agendar
            </a>
        </div>

        <!-- Custom Links Container -->
        <div id="wl-custom-links" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem;" class="fade-up stagger-3"></div>

        <!-- Wi-Fi Card -->
        <div class="glass-card fade-up stagger-3" style="margin-bottom: 1.5rem;">
            <h2 class="card-title"><i class="fas fa-wifi"></i> Rede Wi-Fi</h2>
            <p style="color: var(--muted-foreground); margin-bottom: 1rem; font-size: 0.9rem;">Conecte-se na nossa rede enquanto espera.</p>
            <div class="copy-box" onclick="copyToClipboard('wl-wifi', 'Senha do Wi-Fi copiada!')" id="wl-wifi-container">
                <span id="wl-wifi">...</span>
                <i class="far fa-copy"></i>
            </div>
        </div>

        <!-- PIX Card -->
        <div class="glass-card fade-up stagger-4" style="margin-bottom: 1.5rem;">
            <h2 class="card-title"><i class="fas fa-diamond"></i> Pagamento PIX</h2>
            <p style="color: var(--muted-foreground); margin-bottom: 1rem; font-size: 0.9rem;">Pague de forma rápida e segura.</p>
            <div class="copy-box" onclick="copyToClipboard('wl-pix', 'Chave PIX copiada!')" id="wl-pix-container" style="margin-bottom: 1rem;">
                <span id="wl-pix">...</span>
                <i class="far fa-copy"></i>
            </div>
            <button class="btn btn-outline" onclick="copyToClipboard('wl-pix', 'Chave PIX copiada!')" style="width: 100%;">Copiar Chave PIX</button>
        </div>

        <!-- Google Review -->
        <div id="google-review-container" class="fade-up stagger-5" style="display: none; margin-bottom: 1.5rem;">
            <a href="#" id="wl-google" target="_blank" class="btn" style="width: 100%; display: flex; gap: 0.5rem; background-color: #fff; color: #333;">
                Avalie-nos no Google <span style="color: #fbbc05;">★★★★★</span>
            </a>
        </div>

        <!-- Galeria / Catálogo -->
        <div class="glass-card fade-up stagger-6" id="wl-catalogo-card" style="display: none;">
            <div class="card-title">
                <i class="fas fa-star"></i> <span id="wl-titulo-catalogo">Nosso Catálogo</span>
            </div>
            <div class="catalog-container" id="wl-catalogo">
                <!-- Preenchido dinamicamente via JS -->
            </div>
        </div>
    </div>

    <!-- Toast de Notificação -->
    <div id="toast" class="client-toast">Copiado!</div>

    <!-- Scripts -->
    <script>
        // Cursor Spotlight Logic (Lanterna interna aos cards)
        document.querySelectorAll('.card, .glass-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('SW falhou: ', err);
                });
            });
        }
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
